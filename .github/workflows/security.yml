name: "Security Scan"
on: [pull_request]
permissions:
  contents: read
  pull-requests: write
jobs:
  gosec:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/github.com/aws/amazon-ecs-agent

      - name: Get GO_VERSION
        id: get-go-version
        run: |
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent
          set -eou pipefail
          go_version=$(cat GO_VERSION | tr -d '\n')
          echo "GO_VERSION=$go_version" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.get-go-version.outputs.GO_VERSION }}
          cache: false

      - name: Run gosec
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent/agent
          GOOS=${{ matrix.goos }} GOARCH=amd64 gosec -exclude-generated ./...

  semgrep:
    name: Semgrep Security Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run semgrep on new changes
        run: |
          pip install semgrep --quiet
          BASE_BRANCH="${{ github.base_ref || github.event.repository.default_branch }}"
          BASELINE=$(git merge-base HEAD origin/$BASE_BRANCH 2>/dev/null || echo "")
          BASELINE_FLAG=""
          if [ -n "$BASELINE" ]; then
            BASELINE_FLAG="--baseline-commit $BASELINE"
          fi

          # Emit PR annotations as warnings
          semgrep --config .github/semgrep/rules.yml $BASELINE_FLAG --json 2>/dev/null | \
            jq -r '.results[] | "::warning file=\(.path),line=\(.start.line),endLine=\(.end.line)::[\(.check_id)] \(.extra.message)"' || true

      - name: Comment on PR with findings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          BASELINE=$(git merge-base HEAD origin/$BASE_BRANCH 2>/dev/null || echo "")
          BASELINE_FLAG=""
          if [ -n "$BASELINE" ]; then
            BASELINE_FLAG="--baseline-commit $BASELINE"
          fi

          RESULTS=$(semgrep --config .github/semgrep/rules.yml $BASELINE_FLAG --json 2>/dev/null | jq '.results | length')
          if [ "$RESULTS" -gt 0 ]; then
            COMMENT=$(semgrep --config .github/semgrep/rules.yml $BASELINE_FLAG --json 2>/dev/null | \
              jq -r '"## ⚠️ Security Scan Findings\n\n" + ([.results[] | "- **\(.check_id)** in `\(.path):\(.start.line)`\n  \(.extra.message)"] | join("\n"))')
            echo "$COMMENT" | gh pr comment ${{ github.event.pull_request.number }} --body-file -
          fi
