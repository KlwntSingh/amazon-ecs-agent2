name: "Security Scan"
on: [push, pull_request]
permissions: read-all
jobs:
  gosec:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/github.com/aws/amazon-ecs-agent

      - name: Get GO_VERSION
        id: get-go-version
        run: |
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent
          set -eou pipefail
          go_version=$(cat GO_VERSION | tr -d '\n')
          echo "GO_VERSION=$go_version" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.get-go-version.outputs.GO_VERSION }}
          cache: false

      - name: Run gosec on Windows files
        run: |
          export GOPATH=$GITHUB_WORKSPACE
          export PATH=$PATH:$(go env GOPATH)/bin
          export GO111MODULE=auto
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent
          export GOOS=windows
          export GOARCH=amd64
          gosec -include=G204 -exclude-generated ./agent/taskresource/fsxwindowsfileserver/...
