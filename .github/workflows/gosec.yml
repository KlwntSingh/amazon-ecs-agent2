name: "Gosec Security Scan"
on: [pull_request]
permissions: read-all
jobs:
  gosec:
    name: Gosec (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/github.com/aws/amazon-ecs-agent

      - name: Get GO_VERSION
        id: get-go-version
        run: |
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent
          set -eou pipefail
          go_version=$(cat GO_VERSION | tr -d '\n')
          echo "GO_VERSION=$go_version" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.get-go-version.outputs.GO_VERSION }}
          cache: false

      - name: Run gosec
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd $GITHUB_WORKSPACE/src/github.com/aws/amazon-ecs-agent/agent
          GOOS=${{ matrix.goos }} GOARCH=amd64 gosec -exclude-generated -exclude=G104 ./taskresource/fsxwindowsfileserver/...
